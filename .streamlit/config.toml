# Sector runs on 8502 so it does not collide with BriCoS (Streamlit's default
# 8501), letting both apps be open at the same time. The packaged EXE sets the
# same port explicitly in packaging/run_sector.py (override there with the
# SECTOR_PORT environment variable).
[server]
port = 8502
address = "127.0.0.1"

[client]
# Sector is an engineering application, not a Streamlit development console.
# Keep print/theme controls while hiding deploy, rerun, and clear-cache actions.
toolbarMode = "viewer"
# Show the exception type without exposing local paths, input values, or traces.
showErrorDetails = "type"

[browser]
gatherUsageStats = false
