[pytest]
pythonpath = .
# For a fast full gate, add `-n auto` (needs pytest-xdist, in requirements-dev.txt):
#   python -m pytest -n auto
# Left out of addopts on purpose so a single-test run does not spawn workers.
addopts = -p no:cacheprovider
norecursedirs = .git __pycache__ .pytest_cache build dist
